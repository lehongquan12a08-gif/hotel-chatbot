<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regent Phu Quoc</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Montserrat', sans-serif; }

/* ===== HEADER ===== */
header {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  color: white;
  z-index: 10;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
}

.logo span {
  display: block;
  font-size: 10px;
  letter-spacing: 3px;
}

/* ===== HERO ===== */
.hero {
  height: 100vh;
  background: url("/static/bg.jpg") center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
}

.hero-box {
  padding: 30px;
  background: rgba(0,0,0,0.45);
  border-radius: 14px;
  backdrop-filter: blur(10px);
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  line-height: 1.4;
}

.hero button {
  margin-top: 20px;
  padding: 12px 26px;
  background: #8a5a00;
  border: none;
  color: white;
  cursor: pointer;
}

/* ===== CHAT ===== */
#chat-widget {
  position: fixed;
  bottom: 16px;
  right: 16px;
  z-index: 999;
}

#chat-btn {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  border: none;
  font-size: 24px;
  cursor: pointer;
  background: #8a5a00;
  color: white;
}

/* CHAT BOX */
#chat-box {
  display: none;
  flex-direction: column;
  width: 95vw;
  max-width: 340px;
  height: 70vh;
  max-height: 500px;
  margin-bottom: 10px;
  border-radius: 16px;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(10px);
  color: white;
  overflow: hidden;
}

/* MESSAGES */
#messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  font-size: 14px;
}

.msg {
  margin-bottom: 10px;
  line-height: 1.5;
  white-space: pre-line;
}

/* BUTTON GROUP */
.btn-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: 5px 0 10px;
}

.quick-btn {
  padding: 6px 12px;
  border-radius: 16px;
  border: none;
  background: #8a5a00;
  color: white;
  cursor: pointer;
  font-size: 12px;
}

/* INPUT */
#input {
  display: flex;
  border-top: 1px solid rgba(255,255,255,0.2);
}

#input input {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
}

#input button {
  padding: 10px;
  border: none;
  background: #8a5a00;
  color: white;
}

/* MOBILE FIX */
@media (max-width: 500px) {
  .hero h1 { font-size: 22px; }
}
</style>
</head>

<body>

<header>
  <div class="logo">REGENT<span>PHU QUOC</span></div>
</header>

<section class="hero">
  <div class="hero-box">
    <h1>TRẢI NGHIỆM KỲ NGHỈ ĐẲNG CẤP</h1>
    <button onclick="openChat()">ĐẶT PHÒNG</button>
  </div>
</section>

<!-- CHAT -->
<div id="chat-widget">
  <button id="chat-btn">💬</button>

  <div id="chat-box">
    <div id="messages"></div>

    <div id="input">
      <input id="text" placeholder="Nhập tin nhắn...">
      <button onclick="send()">Gửi</button>
    </div>
  </div>
</div>

<script>
const chatBtn = document.getElementById("chat-btn");
const chatBox = document.getElementById("chat-box");
const messages = document.getElementById("messages");
const input = document.getElementById("text");

let greeted = false;

/* OPEN CHAT */
function openChat(){
  chatBox.style.display = "flex";
}

/* TOGGLE */
chatBtn.onclick = () => {
  chatBox.style.display =
    chatBox.style.display === "flex" ? "none" : "flex";

  if (!greeted) {
    greeted = true;
    addMessage("REGENT",
`Chào quý khách
Tôi là lễ tân Regent Phú Quốc
Quý khách có thể gõ "đặt phòng" để bắt đầu`,
    [
      {label:"📅 Đặt phòng", value:"đặt phòng"},
      {label:"💰 Giá phòng", value:"giá phòng"},
      {label:"🏨 Tiện ích", value:"tiện ích"}
    ]);
  }
};

/* ADD MESSAGE */
function addMessage(sender, text, buttons=[]) {
  const div = document.createElement("div");
  div.className = "msg";
  div.innerHTML = `<b>${sender}:</b><br>${text}`;
  messages.appendChild(div);

  if (buttons.length > 0) {
    const wrap = document.createElement("div");
    wrap.className = "btn-wrap";

    buttons.forEach(b=>{
      const btn = document.createElement("button");
      btn.className = "quick-btn";
      btn.innerText = b.label;
      btn.onclick = ()=>send(b.value);
      wrap.appendChild(btn);
    });

    messages.appendChild(wrap);
  }

  messages.scrollTop = messages.scrollHeight;
}

/* SEND */
async function send(textOverride=null){
  const text = textOverride || input.value.trim();
  if(!text) return;

  addMessage("Bạn", text);
  input.value = "";

  const res = await fetch("/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:text})
  });

  const data = await res.json();
  addMessage("REGENT", data.reply, data.buttons || []);
}

/* ENTER */
input.addEventListener("keydown", e=>{
  if(e.key==="Enter") send();
});
</script>

</body>
</html>
